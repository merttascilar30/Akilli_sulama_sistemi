spring.application.name=backend

# PostgreSQL yerel veritabani baglanti ayarlari
spring.datasource.url=jdbc:postgresql://localhost:5432/akilli_sulama_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate ayarlari
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
server.port=8081

# Python Kural Motoru servis ayarlari
kural-motoru.base-url=http://localhost:8000
kural-motoru.et0-varsayilan=5.0

# Python Simulator kontrol kanali ayarlari (manuel/otonom mod ve vana kapatma komutlari icin)
simulator.control-base-url=http://localhost:5001